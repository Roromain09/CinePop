<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes réservations — CinéPop</title>
  <link rel="icon" href="img/favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bleu: #07111f; --bleu2: #0f1d33; --bleu3: #17284a;
    --jaune: #f5b700; --jaune-soft: #ffd84d;
    --blanc: #ffffff; --gris: #a7b3d1;
    --vert: #39d98a; --rouge: #ff6b6b; --orange: #ff8c66;
    --ombre: rgba(0, 0, 0, 0.45);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    min-height: 100vh;
    color: var(--blanc);
    background:
      radial-gradient(circle at top, rgba(245, 183, 0, 0.14), transparent 28%),
      radial-gradient(circle at bottom right, rgba(17, 34, 64, 0.95), transparent 34%),
      linear-gradient(180deg, #0f1d33 0%, #07111f 100%);
    padding-bottom: 60px;
  }

  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 32px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .logo { display:flex; align-items:center; gap:10px; font-weight:900; font-size:1.2rem; }
  .logo .dot { width:10px; height:10px; border-radius:50%; background: var(--jaune); box-shadow: 0 0 18px rgba(245,183,0,0.8); }
  .nav-links { display:flex; gap:8px; }
  .nav-links a {
    color: var(--gris); text-decoration:none; font-weight:600; font-size:0.92rem;
    padding:9px 16px; border-radius:999px; transition: all 0.2s ease;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--blanc); background: rgba(255,255,255,0.07); }

  .wrap { max-width: 720px; margin: 0 auto; padding: 10px 24px; }

  .search-card {
    background: rgba(17, 34, 64, 0.78);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 28px;
    padding: 36px;
    box-shadow: 0 24px 70px var(--ombre);
    text-align: center;
    position: relative;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .search-card::before {
    content: ""; position: absolute; top:0; left:0; right:0; height: 5px;
    background: linear-gradient(90deg, var(--jaune), var(--jaune-soft));
  }

  .brand-pill {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 999px;
    background: rgba(245, 183, 0, 0.12); color: var(--jaune-soft);
    font-weight: 700; border: 1px solid rgba(245, 183, 0, 0.22);
    margin-bottom: 20px;
  }
  .brand-pill .dot { width:10px; height:10px; border-radius:50%; background: var(--jaune); box-shadow: 0 0 18px rgba(245,183,0,0.8); }
  h1 { font-size: clamp(1.6rem, 4vw, 2.1rem); font-weight: 900; margin-bottom: 10px; }
  .page-subtitle { color: var(--gris); font-size: 0.95rem; margin-bottom: 26px; }

  .search-box {
    display: flex; gap: 12px; max-width: 500px; margin: 0 auto;
  }
  input {
    flex: 1; padding: 14px 18px; border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05);
    color: var(--blanc); font-size: 1rem; outline: none; transition: border-color 0.2s;
  }
  input:focus { border-color: var(--jaune); background: rgba(255,255,255,0.08); }
  input::placeholder { color: rgba(255,255,255,0.35); }

  button.btn-search {
    padding: 0 24px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, var(--jaune), var(--jaune-soft));
    color: #111; font-weight: 800; font-size: 0.95rem; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  button.btn-search:hover { transform: translateY(-1px); }

  .res-card {
    background: rgba(17, 34, 64, 0.6); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 22px; padding: 24px; margin-bottom: 18px;
    display: grid; grid-template-columns: auto 1fr; gap: 24px; align-items: center;
    box-shadow: 0 12px 36px var(--ombre); animation: fadeIn 0.3s ease both;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  .qr-frame {
    background: #ffffff; padding: 10px; border-radius: 14px;
    width: 100px; height: 100px; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  }
  .qr-frame img { width: 100%; height: 100%; object-fit: contain; }

  .card-body { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px 16px; }
  .card-title { grid-column: span 2; font-size: 1.25rem; font-weight: 800; color: var(--jaune-soft); margin-bottom: 2px; }
  .card-field { display: flex; flex-direction: column; }
  .field-label { font-size: 0.72rem; text-transform: uppercase; color: var(--gris); font-weight: 700; letter-spacing: 0.3px; margin-bottom: 1px; }
  .field-value { font-size: 0.95rem; font-weight: 600; color: var(--blanc); }

  .error-card, .empty-state {
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
    border-radius: 22px; padding: 40px; text-align: center; color: var(--gris); font-size: 0.95rem;
  }
  .empty-state .icon { font-size: 2.2rem; margin-bottom: 10px; }
  .error-card { border-color: rgba(255,107,107,0.15); color: #ff8c66; background: rgba(255,107,107,0.02); }

  .nav-toggle {
    display: none; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    color: var(--blanc); font-size: 1.3rem; line-height: 1; padding: 8px 14px; border-radius: 12px; cursor: pointer;
  }
  @media (max-width: 680px) {
    nav { flex-wrap: wrap; }
    .nav-toggle { display: block; }
    .nav-links { display: none; width: 100%; flex-direction: column; gap: 6px; margin-top: 14px; }
    .nav-links.open { display: flex; }
    .nav-links a { text-align: center; padding: 12px 16px; }
    .res-card { grid-template-columns: 1fr; justify-items: center; text-align: center; padding: 28px; }
    .card-body { grid-template-columns: 1fr; gap: 12px; width: 100%; }
    .card-title { grid-column: span 1; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo"><div class="dot"></div>CinéPop</div>
  <button class="nav-toggle" id="navToggle">☰</button>
  <div class="nav-links" id="navLinks">
    <a href="/index.html">Accueil</a>
    <a href="/programme.html">Programme</a>
    <a href="/check.html" class="active">Mes réservations</a>
    <a href="/historique.html">Historique</a>
    <a href="/support.html">Support</a>
    <a href="/connexion.html" id="navCompteLink">Mon compte</a>
  </div>
</nav>

<div class="wrap">
  <div class="search-card">
    <div class="brand-pill"><div class="dot"></div>Accès Instantané</div>
    <h1>Retrouver mon billet</h1>
    <div class="page-subtitle">Saisissez le nom utilisé lors de la réservation pour afficher votre QR code d'accès.</div>

    <div class="search-box">
      <input type="text" id="nameInput" placeholder="Ex: Jean Dupont" onkeydown="if(event.key==='Enter') search()" />
      <button class="btn-search" onclick="search()">Rechercher</button>
    </div>
  </div>

  <div id="result">
    <div class="empty-state">
      <div class="icon">🔍</div>
      Vos réservations apparaîtront ici.
    </div>
  </div>
</div>

<script>
const nameInput = document.getElementById("nameInput");
const resultDiv = document.getElementById("result");

function formatDate(isoStr) {
  if (!isoStr) return "";
  const [y, m, d] = isoStr.split("-");
  return `${d}/${m}/${y}`;
}

function emptyState(icon, text) {
  return `<div class="empty-state"><div class="icon">${icon}</div>${text}</div>`;
}

function buildCard(r) {
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(r.id)}&color=07111f`;

  return `
    <div class="res-card">
      <div class="qr-frame">
        <img src="${qrUrl}" alt="QR Code d'accès">
      </div>
      <div class="card-body">
        <div class="card-title">${r.filmTitle}</div>
        <div class="card-field"><span class="field-label">Titulaire</span><span class="field-value">${r.clientName}</span></div>
        <div class="card-field"><span class="field-label">Personnes</span><span class="field-value">🎟 ${r.peopleNumber}</span></div>
        <div class="card-field"><span class="field-label">Date</span><span class="field-value">📅 ${formatDate(r.sessionDate)}</span></div>
        <div class="card-field"><span class="field-label">Heure</span><span class="field-value">🕐 ${r.sessionTime}</span></div>
        ${r.roomNumber ? `<div class="card-field"><span class="field-label">Salle</span><span class="field-value">🏛 ${r.roomNumber}</span></div>` : ""}
      </div>
    </div>`;
}

async function search() {
  const name = nameInput.value.trim();

  if (!name) {
    resultDiv.innerHTML = `<div class="error-card">⚠ Merci d'entrer un nom.</div>`;
    return;
  }

  resultDiv.innerHTML = emptyState("⏳", "Recherche en cours…");

  try {
    const res = await fetch(`/api/reservation?name=${encodeURIComponent(name)}`);
    const data = await res.json();

    if (!data.ok) {
      resultDiv.innerHTML = emptyState("🔍", data.error || "Aucune réservation trouvée.");
      return;
    }

    resultDiv.innerHTML = data.reservations.map(buildCard).join(\"\");
  } catch {
    resultDiv.innerHTML = `<div class="error-card">Erreur lors de la recherche. Réessayez ultérieurement.</div>`;
  }
}

document.getElementById("navToggle").addEventListener("click", () => {
  document.getElementById("navLinks").classList.toggle("open");
});

// 3 — Initialisation Supabase et état de la Navigation
(async () => {
  const _sb = supabase.createClient(
    "https://fsywnmsppegrffvoijuv.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzeXdubXNwcGVncmZmdm9panV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTE1MjUsImV4cCI6MjA5NzE4NzUyNX0.dXoTVu3ZN5kt7JtqSy9PcQpqI9vvto1s61S23WuJgbU"
  );
  const { data: { session } } = await _sb.auth.getSession();
  const link = document.getElementById("navCompteLink");
  if (session?.user) {
    link.href = "/compte.html";
    link.textContent = "Mon compte";
  } else {
    link.href = "/connexion.html";
    link.textContent = "Connexion";
  }
})();
</script>
</body>
</html>
