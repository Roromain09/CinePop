<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support — CinéPop</title>
  <link rel="icon" href="img/favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --bleu: #07111f; --bleu2: #0f1d33; --bleu3: #17284a;
      --jaune: #f5b700; --jaune-soft: #ffd84d;
      --blanc: #ffffff; --gris: #a7b3d1;
      --vert: #39d98a; --rouge: #ff6b6b;
      --ombre: rgba(0, 0, 0, 0.45);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      min-height: 100vh;
      color: var(--blanc);
      background:
        radial-gradient(circle at top, rgba(245, 183, 0, 0.14), transparent 28%),
        radial-gradient(circle at bottom right, rgba(17, 34, 64, 0.95), transparent 34%),
        linear-gradient(180deg, #0f1d33 0%, #07111f 100%);
      padding-bottom: 60px;
    }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 32px; max-width: 1200px; margin: 0 auto;
    }
    .logo { display:flex; align-items:center; gap:10px; font-weight:900; font-size:1.2rem; }
    .logo .dot { width:10px; height:10px; border-radius:50%; background: var(--jaune); box-shadow: 0 0 18px rgba(245,183,0,0.8); }
    .nav-links { display:flex; gap:8px; }
    .nav-links a {
      color: var(--gris); text-decoration:none; font-weight:600; font-size:0.92rem;
      padding:9px 16px; border-radius:999px; transition: all 0.2s ease;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--blanc); background: rgba(255,255,255,0.07); }

    .wrap { max-width: 640px; margin: 0 auto; padding: 10px 24px; }

    .form-card {
      background: rgba(17, 34, 64, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      padding: 36px;
      box-shadow: 0 24px 70px var(--ombre);
      position: relative;
      overflow: hidden;
    }
    .form-card::before {
      content: ""; position: absolute; top:0; left:0; right:0; height: 5px;
      background: linear-gradient(90deg, var(--jaune), var(--jaune-soft));
    }
    .brand-pill {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: 999px;
      background: rgba(245, 183, 0, 0.12); color: var(--jaune-soft);
      font-weight: 700; border: 1px solid rgba(245, 183, 0, 0.22);
      margin-bottom: 20px;
    }
    .brand-pill .dot { width:10px; height:10px; border-radius:50%; background: var(--jaune); box-shadow: 0 0 18px rgba(245,183,0,0.8); }

    h1 { font-size: clamp(1.6rem, 4vw, 2.1rem); font-weight: 900; margin-bottom: 8px; }
    .page-subtitle { color: var(--gris); font-size: 0.95rem; margin-bottom: 28px; line-height: 1.5; }

    form { display: grid; gap: 16px; }
    form.hidden { display: none; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: 0.8rem; color: var(--gris); font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }

    input, textarea {
      width: 100%; padding: 14px 16px; border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.04);
      color: var(--blanc); font-size: 0.95rem; outline: none; transition: border-color 0.2s;
    }
    textarea { resize: vertical; min-height: 120px; font-family: inherit; }
    input:focus, textarea:focus { border-color: var(--jaune); background: rgba(255, 255, 255, 0.07); }
    input::placeholder, textarea::placeholder { color: rgba(255, 255, 255, 0.3); }

    button.btn-submit {
      padding: 14px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, var(--jaune), var(--jaune-soft));
      color: #111; font-weight: 800; font-size: 0.98rem; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s; margin-top: 6px;
    }
    button.btn-submit:hover { transform: translateY(-1px); box-shadow: 0 10px 20px rgba(245,183,0,0.15); }
    button.btn-submit:disabled { background: rgba(255,255,255,0.1); color: var(--gris); pointer-events: none; }

    .status-card {
      padding: 16px; border-radius: 14px; font-size: 0.92rem; font-weight: 600;
      display: none; animation: slideIn 0.2s ease both; margin-bottom: 16px;
    }
    .status-card.show { display: block; }
    .status-card.error { background: rgba(255,107,107,0.12); border: 1px solid rgba(255,107,107,0.2); color: #ff8c66; }
    .status-card.success {
      background: rgba(57,217,138,0.12); border: 1px solid rgba(57,217,138,0.2); color: #57ebb3;
      text-align: center; padding: 32px 20px; margin-bottom: 0;
    }
    .status-card.success .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .status-card.success h3 { font-size: 1.3rem; margin-bottom: 6px; color: var(--blanc); }
    .status-card.success p { color: var(--gris); font-weight: 500; font-size: 0.9rem; }

    @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

    .nav-toggle {
      display: none; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      color: var(--blanc); font-size: 1.3rem; line-height: 1; padding: 8px 14px; border-radius: 12px; cursor: pointer;
    }
    @media (max-width: 680px) {
      nav { flex-wrap: wrap; }
      .nav-toggle { display: block; }
      .nav-links { display: none; width: 100%; flex-direction: column; gap: 6px; margin-top: 14px; }
      .nav-links.open { display: flex; }
      .nav-links a { text-align: center; padding: 12px 16px; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo"><div class="dot"></div>CinéPop</div>
  <button class="nav-toggle" id="navToggle">☰</button>
  <div class="nav-links" id="navLinks">
    <a href="/index.html">Accueil</a>
    <a href="/programme.html">Programme</a>
    <a href="/check.html">Mes réservations</a>
    <a href="/historique.html">Historique</a>
    <a href="/support.html" class="active">Support</a>
    <a href="/connexion.html" id="navCompteLink">Mon compte</a>
  </div>
</nav>

<div class="wrap">
  <div class="form-card">
    <div class="brand-pill"><div class="dot"></div>Assistance</div>
    
    <div id="successCard" class="status-card success">
      <div class="icon">🚀</div>
      <h3>Message envoyé !</h3>
      <p>Merci, notre équipe technique va traiter votre demande dans les plus brefs délais.</p>
    </div>

    <form id="supportForm">
      <h1>Contacter le support</h1>
      <p class="page-subtitle">Une question sur une réservation ou un problème technique ? Envoyez-nous un message.</p>

      <div id="errorCard" class="status-card error"></div>

      <div class="field">
        <label for="email">Votre adresse email</label>
        <input type="email" id="email" placeholder="nom@exemple.com" required />
      </div>

      <div class="field">
        <label for="subject">Sujet de la demande</label>
        <input type="text" id="subject" placeholder="Ex: Problème de QR Code" required />
      </div>

      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" placeholder="Décrivez votre situation en détail..." required></textarea>
      </div>

      <button type="submit" id="submitBtn" class="btn-submit">Envoyer le message</button>
    </form>
  </div>
</div>

<script>
  const form = document.getElementById("supportForm");
  const submitBtn = document.getElementById("submitBtn");
  const errorCard = document.getElementById("errorCard");
  const successCard = document.getElementById("successCard");

  function showError(message) {
    errorCard.textContent = message;
    errorCard.classList.add("show");
  }
  function hideError() {
    errorCard.classList.remove("show");
    errorCard.textContent = "";
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    hideError();

    const data = {
      email: document.getElementById("email").value.trim(),
      subject: document.getElementById("subject").value.trim(),
      message: document.getElementById("message").value.trim()
    };

    if (!data.email || !data.subject || !data.message) {
      showError("⛔ Merci de remplir tous les champs.");
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Envoi en cours...";

    try {
      const res = await fetch("/api/support", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      });

      if (!res.ok) {
        const text = await res.text();
        throw new Error(text || "Erreur lors de l'envoi.");
      }

      form.classList.add("hidden");
      successCard.classList.add("show");

    } catch (err) {
      showError(err.message || "Impossible d'envoyer le message.");
      submitBtn.disabled = false;
      submitBtn.textContent = "Envoyer le message";
    }
  });

  document.getElementById("navToggle").addEventListener("click", () => {
    document.getElementById("navLinks").classList.toggle("open");
  });

  // 3 — Initialisation Supabase et état de la Navigation
  (async () => {
    const _sb = supabase.createClient(
      "https://fsywnmsppegrffvoijuv.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzeXdubXNwcGVncmZmdm9panV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTE1MjUsImV4cCI6MjA5NzE4NzUyNX0.dXoTVu3ZN5kt7JtqSy9PcQpqI9vvto1s61S23WuJgbU"
    );
    const { data: { session } } = await _sb.auth.getSession();
    const link = document.getElementById("navCompteLink");
    if (session?.user) {
      link.href = "/compte.html";
      link.textContent = "Mon compte";
    } else {
      link.href = "/connexion.html";
      link.textContent = "Connexion";
    }
  })();
</script>
</body>
</html>
