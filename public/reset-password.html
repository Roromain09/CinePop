<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nouveau mot de passe — CinéPop</title>
  <link rel="icon" href="img/favicon.ico">
  <style>
    :root {
      --bleu: #07111f; --bleu2: #0f1d33; --bleu3: #17284a;
      --jaune: #f5b700; --jaune-soft: #ffd84d;
      --blanc: #ffffff; --gris: #a7b3d1;
      --vert: #39d98a; --rouge: #ff6b6b;
      --ombre: rgba(0, 0, 0, 0.45);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      min-height: 100vh;
      color: var(--blanc);
      background:
        radial-gradient(circle at top, rgba(245, 183, 0, 0.14), transparent 28%),
        radial-gradient(circle at bottom right, rgba(17, 34, 64, 0.95), transparent 34%),
        linear-gradient(180deg, #0f1d33 0%, #07111f 100%);
      padding-bottom: 60px;
    }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 32px; max-width: 1200px; margin: 0 auto;
    }
    .logo { display:flex; align-items:center; gap:10px; font-weight:900; font-size:1.2rem; }
    .logo .dot { width:10px; height:10px; border-radius:50%; background: var(--jaune); box-shadow: 0 0 18px rgba(245,183,0,0.8); }

    .wrap { max-width: 440px; margin: 10px auto; padding: 0 24px; }

    .form-card {
      background: rgba(17, 34, 64, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px; padding: 38px 36px;
      box-shadow: 0 24px 70px var(--ombre);
      position: relative; overflow: hidden;
    }
    .form-card::before {
      content: ""; position: absolute; top:0; left:0; right:0; height: 5px;
      background: linear-gradient(90deg, var(--jaune), var(--jaune-soft));
    }

    .brand-pill {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: 999px;
      background: rgba(245, 183, 0, 0.12); color: var(--jaune-soft);
      font-weight: 700; border: 1px solid rgba(245, 183, 0, 0.22);
      margin-bottom: 20px;
    }
    .brand-pill .dot { width:10px; height:10px; border-radius:50%; background: var(--jaune); box-shadow: 0 0 18px rgba(245,183,0,0.8); }

    h1 { font-size: 1.8rem; font-weight: 900; margin-bottom: 6px; }
    .page-subtitle { color: var(--gris); font-size: 0.92rem; line-height: 1.6; margin-bottom: 28px; }

    .form-fields { display: flex; flex-direction: column; gap: 14px; }
    .field-group { display: flex; flex-direction: column; gap: 5px; }
    .field-label {
      font-size: 0.74rem; font-weight: 700; letter-spacing: 0.5px;
      text-transform: uppercase; color: var(--gris);
    }

    .input-wrap { position: relative; }
    input {
      width: 100%; padding: 14px 16px; padding-right: 48px; border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      background: rgba(255, 255, 255, 0.05); color: var(--blanc);
      font-size: 1rem; outline: none; font-family: inherit;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }
    input::placeholder { color: rgba(255, 255, 255, 0.35); }
    input:focus {
      border-color: var(--jaune); background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 4px rgba(245, 183, 0, 0.14); transform: translateY(-1px);
    }

    .toggle-pw {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--gris); font-size: 1rem; padding: 4px;
      transition: color 0.2s ease;
    }
    .toggle-pw:hover { color: var(--blanc); }

    .strength-bar { height: 4px; border-radius: 999px; background: rgba(255,255,255,0.07); overflow: hidden; margin-top: 6px; }
    .strength-fill { height: 100%; border-radius: 999px; width: 0%; transition: width 0.3s ease, background 0.3s ease; }
    .strength-label { font-size: 0.72rem; color: var(--gris); margin-top: 4px; }

    .error-card {
      display: none; padding: 13px 15px; border-radius: 12px;
      background: rgba(255,107,107,0.12); border: 1px solid rgba(255,107,107,0.3);
      color: #ffd6d6; font-size: 0.88rem;
    }
    .error-card.show { display: block; }

    .btn-submit {
      width: 100%; padding: 15px 18px; border: none; border-radius: 14px;
      background: linear-gradient(135deg, var(--jaune), var(--jaune-soft)); color: #111;
      font-size: 1rem; font-weight: 900; letter-spacing: 0.4px; cursor: pointer;
      box-shadow: 0 12px 28px rgba(245, 183, 0, 0.24);
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .btn-submit:hover { transform: translateY(-2px); }
    .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .success-card { display: none; text-align: center; padding: 10px 0; }
    .success-card.show { display: block; }
    .check-icon {
      width: 52px; height: 52px; border-radius: 50%; background: var(--vert);
      color: #06281a; display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 1.5rem; margin: 0 auto 16px;
    }
    .success-title { font-weight: 900; font-size: 1.15rem; margin-bottom: 8px; }
    .success-sub { color: var(--gris); font-size: 0.9rem; line-height: 1.6; }
    .success-sub a { color: var(--jaune-soft); font-weight: 700; text-decoration: none; }

    /* État d'erreur : token invalide ou expiré */
    .token-error { display: none; text-align: center; padding: 10px 0; }
    .token-error.show { display: block; }
    .token-error .error-icon { font-size: 2.5rem; margin-bottom: 14px; }
    .token-error p { color: var(--gris); font-size: 0.9rem; line-height: 1.6; }
    .token-error a { color: var(--jaune-soft); font-weight: 700; text-decoration: none; }

    @media (max-width: 540px) {
      .form-card { padding: 28px 22px; border-radius: 22px; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<nav>
  <div class="logo"><span class="dot"></span> CINÉPOP</div>
</nav>

<div class="wrap">
  <div class="form-card">
    <div class="brand-pill"><span class="dot"></span> CINÉPOP — Sécurité</div>
    <h1>Nouveau mot de passe</h1>
    <p class="page-subtitle">Choisis un nouveau mot de passe sécurisé pour ton compte.</p>

    <!-- Formulaire -->
    <div class="form-fields" id="resetForm">
      <div class="field-group">
        <label class="field-label" for="password">Nouveau mot de passe</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="8 caractères minimum" oninput="checkStrength(this.value)">
          <button class="toggle-pw" type="button" onclick="togglePw('password','btn1')" id="btn1" aria-label="Afficher">👁</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-label" id="strengthLabel">—</div>
      </div>

      <div class="field-group">
        <label class="field-label" for="passwordConfirm">Confirmer le mot de passe</label>
        <div class="input-wrap">
          <input type="password" id="passwordConfirm" placeholder="Répète ton mot de passe">
          <button class="toggle-pw" type="button" onclick="togglePw('passwordConfirm','btn2')" id="btn2" aria-label="Afficher">👁</button>
        </div>
      </div>

      <div id="errorCard" class="error-card"></div>

      <button class="btn-submit" id="submitBtn" onclick="resetPassword()">Enregistrer le mot de passe</button>
    </div>

    <!-- Succès -->
    <div class="success-card" id="successCard">
      <div class="check-icon">✓</div>
      <div class="success-title">Mot de passe mis à jour !</div>
      <div class="success-sub">
        Ton nouveau mot de passe est actif.<br>
        <a href="/connexion.html">Se connecter →</a>
      </div>
    </div>

    <!-- Token invalide -->
    <div class="token-error" id="tokenError">
      <div class="error-icon">🔗</div>
      <p>Ce lien de réinitialisation est invalide ou a expiré.<br><br>
        <a href="/connexion.html">Retourner à la connexion →</a>
      </p>
    </div>
  </div>
</div>

<script>
const { createClient } = supabase;
const _supabase = createClient(
  "https://fsywnmsppegrffvoijuv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzeXdubXNwcGVncmZmdm9panV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTE1MjUsImV4cCI6MjA5NzE4NzUyNX0.dXoTVu3ZN5kt7JtqSy9PcQpqI9vvto1s61S23WuJgbU"
);

/* Supabase injecte le token dans le fragment (#access_token=...&type=recovery)
   La lib supabase-js le détecte automatiquement à l'init et établit une session. */
async function init() {
  const { data: { session } } = await _supabase.auth.getSession();

  // Pas de session valide = lien expiré ou déjà utilisé
  if (!session) {
    document.getElementById("resetForm").style.display = "none";
    document.querySelector(".page-subtitle").style.display = "none";
    document.getElementById("tokenError").classList.add("show");
  }
}
init();

/* ── AFFICHER/MASQUER MOT DE PASSE ── */
const pwStates = {};
function togglePw(inputId, btnId) {
  pwStates[inputId] = !pwStates[inputId];
  const input = document.getElementById(inputId);
  const btn   = document.getElementById(btnId);
  input.type  = pwStates[inputId] ? "text" : "password";
  btn.textContent = pwStates[inputId] ? "🙈" : "👁";
}

/* ── FORCE MOT DE PASSE ── */
function checkStrength(val) {
  const fill  = document.getElementById("strengthFill");
  const label = document.getElementById("strengthLabel");
  if (!val) { fill.style.width = "0%"; label.textContent = "—"; return; }
  let score = 0;
  if (val.length >= 8)           score++;
  if (/[A-Z]/.test(val))        score++;
  if (/[0-9]/.test(val))        score++;
  if (/[^a-zA-Z0-9]/.test(val)) score++;
  const levels = [
    { pct: "20%",  color: "#ff6b6b", text: "Très faible" },
    { pct: "40%",  color: "#ff8c66", text: "Faible" },
    { pct: "65%",  color: "#ffd84d", text: "Moyen" },
    { pct: "85%",  color: "#39d98a", text: "Fort" },
    { pct: "100%", color: "#39d98a", text: "Très fort" },
  ];
  const lv = levels[Math.min(score, 4)];
  fill.style.width      = lv.pct;
  fill.style.background = lv.color;
  label.textContent     = lv.text;
  label.style.color     = lv.color;
}

/* ── ERREUR ── */
function showError(msg) {
  const el = document.getElementById("errorCard");
  el.textContent = msg;
  el.classList.add("show");
}
function hideError() {
  document.getElementById("errorCard").classList.remove("show");
}

/* ── RESET ── */
async function resetPassword() {
  hideError();
  const password = document.getElementById("password").value;
  const confirm  = document.getElementById("passwordConfirm").value;

  if (!password) { showError("⛔ Saisis ton nouveau mot de passe."); return; }
  if (password.length < 8) { showError("⛔ Le mot de passe doit faire au moins 8 caractères."); return; }
  if (password !== confirm) { showError("⛔ Les mots de passe ne correspondent pas."); return; }

  const btn = document.getElementById("submitBtn");
  btn.disabled    = true;
  btn.textContent = "Enregistrement…";

  try {
    const { error } = await _supabase.auth.updateUser({ password });
    if (error) throw error;

    document.getElementById("resetForm").style.display   = "none";
    document.querySelector(".page-subtitle").style.display = "none";
    document.getElementById("successCard").classList.add("show");

  } catch (err) {
    showError("❌ " + (err.message || "Erreur lors de la mise à jour."));
    btn.disabled    = false;
    btn.textContent = "Enregistrer le mot de passe";
  }
}

document.addEventListener("keydown", e => {
  if (e.key === "Enter") resetPassword();
});
</script>

</body>
</html>
