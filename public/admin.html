<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Cinéma</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'DM Sans', sans-serif;
}

:root {
  --bg: #080f1a;
  --surface: #0d1b2e;
  --surface2: #112240;
  --gold: #f5b700;
  --gold-light: #ffd84d;
  --red: #ff4455;
  --green: #00e896;
  --orange: #ff8c00;
  --blue: #4da6ff;
  --text: #e8eaf0;
  --text-muted: #7b8ba0;
  --border: rgba(245,183,0,0.12);
}

body {
  background: var(--bg);
  color: var(--text);
  padding: 20px;
  min-height: 100vh;
}

/* ─── HEADER ─── */
h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.4rem;
  letter-spacing: 3px;
  color: var(--gold);
  text-align: center;
  margin-bottom: 28px;
  text-shadow: 0 0 30px rgba(245,183,0,0.25);
}

/* ─── TABS ─── */
.tabs {
  display: flex;
  gap: 4px;
  background: var(--surface);
  border-radius: 14px;
  padding: 5px;
  margin-bottom: 24px;
  border: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }

.tab-btn {
  flex: 1;
  min-width: 110px;
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  background: transparent;
  color: var(--text-muted);
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  white-space: nowrap;
}

.tab-btn .badge {
  background: rgba(255,255,255,0.1);
  padding: 1px 7px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 700;
  transition: all 0.25s;
}

.tab-btn.active-attente  { background: rgba(245,183,0,0.15);  color: var(--gold);   }
.tab-btn.active-valide   { background: rgba(0,232,150,0.13);  color: var(--green);  }
.tab-btn.active-refuse   { background: rgba(255,68,85,0.13);  color: var(--red);    }
.tab-btn.active-expire   { background: rgba(255,140,0,0.13);  color: var(--orange); }
.tab-btn.active-programme{ background: rgba(77,166,255,0.13); color: var(--blue);   }

.tab-btn.active-attente  .badge { background: var(--gold);   color: var(--bg); }
.tab-btn.active-valide   .badge { background: var(--green);  color: var(--bg); }
.tab-btn.active-refuse   .badge { background: var(--red);    color: #fff; }
.tab-btn.active-expire   .badge { background: var(--orange); color: #fff; }
.tab-btn.active-programme.badge { background: var(--blue);   color: #fff; }

/* ─── PANELS ─── */
.tab-panel { display: none; flex-direction: column; gap: 14px; }
.tab-panel.visible { display: flex; }

/* ─── CARDS ─── */
.resa-card {
  background: var(--surface2);
  border-radius: 14px;
  padding: 18px 20px;
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.resa-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 28px rgba(0,0,0,0.45);
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 14px;
  gap: 10px;
  flex-wrap: wrap;
}

.client-name {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--text);
}

.film-badge {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.9rem;
  letter-spacing: 1px;
  background: rgba(245,183,0,0.12);
  color: var(--gold);
  border-radius: 6px;
  padding: 3px 10px;
}

.card-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px 16px;
  margin-bottom: 14px;
}

.card-field {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.field-label {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-muted);
}

.field-value {
  font-size: 0.88rem;
  color: var(--text);
}

.card-id {
  font-size: 0.72rem;
  color: var(--text-muted);
  font-family: monospace;
  margin-bottom: 14px;
}

.card-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.status-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.78rem;
  font-weight: 700;
}

.chip-valide  { background: rgba(0,232,150,0.12); color: var(--green); }
.chip-refuse  { background: rgba(255,68,85,0.12);  color: var(--red); }
.chip-expire  { background: rgba(255,140,0,0.12);  color: var(--orange); }

/* ─── BUTTONS ─── */
.btn {
  padding: 8px 14px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  transition: all 0.2s;
}
.btn-validate  { background: var(--gold); color: var(--bg); }
.btn-validate:hover  { background: var(--gold-light); }
.btn-refuse    { background: rgba(255,68,85,0.15); color: var(--red); border: 1px solid rgba(255,68,85,0.3); }
.btn-refuse:hover    { background: rgba(255,68,85,0.28); }
.btn-delete    { background: rgba(255,68,85,0.1); color: var(--red); border: 1px solid rgba(255,68,85,0.2); }
.btn-delete:hover    { background: rgba(255,68,85,0.22); }
.btn-reprint   { background: rgba(77,166,255,0.15); color: var(--blue); border: 1px solid rgba(77,166,255,0.3); }
.btn-reprint:hover   { background: rgba(77,166,255,0.28); }
.btn-edit      { background: rgba(77,166,255,0.12); color: var(--blue); border: 1px solid rgba(77,166,255,0.25); }
.btn-edit:hover      { background: rgba(77,166,255,0.24); }

/* ─── EMPTY STATE ─── */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
  font-size: 0.9rem;
}
.empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

/* ─── FAB ─── */
#fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: var(--surface2);
  color: var(--gold);
  border: 1px solid var(--border);
  font-size: 20px;
  cursor: pointer;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 14px rgba(0,0,0,0.5);
  transition: all 0.2s;
}
#fab:hover { background: rgba(245,183,0,0.1); }

/* ─── CREATE PANEL ─── */
#creer-panel {
  display: none;
  position: fixed;
  bottom: 78px;
  right: 20px;
  background: var(--surface2);
  border-radius: 14px;
  padding: 20px;
  width: 300px;
  max-height: 70vh;
  overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  z-index: 100;
  border: 1px solid var(--border);
}

#creer-panel h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 1.5px;
  color: var(--gold);
  margin-bottom: 12px;
}

.form-fields {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.form-fields input,
.form-fields select,
.form-fields textarea {
  padding: 9px 12px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.08);
  background: var(--bg);
  color: var(--text);
  font-size: 0.84rem;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border 0.2s;
}
.form-fields input:focus,
.form-fields select:focus,
.form-fields textarea:focus {
  border-color: var(--gold);
}
.form-fields input::placeholder, .form-fields textarea::placeholder { color: var(--text-muted); }

/* ─── PROGRAMME TAB ─── */
.programme-section { margin-bottom: 28px; }
.programme-section h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  letter-spacing: 1.5px;
  color: var(--gold);
  margin-bottom: 14px;
}
.inline-form {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 16px;
}
.inline-form input, .inline-form select {
  padding: 9px 12px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.08);
  background: var(--bg);
  color: var(--text);
  font-size: 0.84rem;
  outline: none;
}
.inline-form button {
  grid-column: 1 / -1;
}
.film-row, .seance-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 8px;
}
.film-row .title, .seance-row .title { font-weight: 700; font-size: 0.92rem; }
.film-row .meta, .seance-row .meta { font-size: 0.78rem; color: var(--text-muted); }
.row-actions { display: flex; gap: 6px; }

/* ─── LOADER ─── */
#loader {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(8,15,26,0.88);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
  flex-direction: column;
  backdrop-filter: blur(4px);
}
.spinner {
  border: 4px solid rgba(255,255,255,0.1);
  border-top: 4px solid var(--gold);
  border-radius: 50%;
  width: 46px;
  height: 46px;
  animation: spin 0.8s linear infinite;
}
#loader p { margin-top: 14px; color: var(--gold); font-size: 0.85rem; letter-spacing: 0.5px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── LOGIN ─── */
#login-screen {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}
#login-screen h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem;
  letter-spacing: 2px;
  color: var(--gold);
  margin-bottom: 22px;
}
#admin-pass {
  padding: 11px 16px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  width: 220px;
  text-align: center;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  outline: none;
}
#admin-pass:focus { border-color: var(--gold); }

@media (max-width: 600px) {
  .card-grid { grid-template-columns: 1fr; }
  .card-actions { flex-direction: column; }
  .card-actions .btn { width: 100%; text-align: center; }
  #creer-panel { width: calc(100vw - 32px); right: 16px; }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-screen">
  <h2>🔐 Accès Administrateur</h2>
  <input id="admin-pass" type="password" placeholder="Mot de passe" onkeydown="if(event.key==='Enter') checkPassword()">
  <button onclick="checkPassword()" class="btn btn-validate" style="margin-top:14px; padding:11px 28px; font-size:0.9rem; border-radius:10px;">
    Entrer
  </button>
  <p id="error-msg" style="color:var(--red); margin-top:12px; font-size:0.85rem; display:none;">
    ❌ Mot de passe incorrect
  </p>
</div>

<h1>🎬 Administration CinéPop</h1>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active-attente" id="tab-attente" onclick="switchTab('attente')">
    ⏳ En attente <span class="badge" id="count-attente">0</span>
  </button>
  <button class="tab-btn" id="tab-valide" onclick="switchTab('valide')">
    ✅ Validées <span class="badge" id="count-valide">0</span>
  </button>
  <button class="tab-btn" id="tab-refuse" onclick="switchTab('refuse')">
    ❌ Refusées <span class="badge" id="count-refuse">0</span>
  </button>
  <button class="tab-btn" id="tab-expire" onclick="switchTab('expire')">
    ⏱ Expirées <span class="badge" id="count-expire">0</span>
  </button>
  <button class="tab-btn" id="tab-programme" onclick="switchTab('programme')">
    🎞 Programme
  </button>
</div>

<!-- PANELS -->
<div class="tab-panel visible" id="panel-attente"></div>
<div class="tab-panel" id="panel-valide"></div>
<div class="tab-panel" id="panel-refuse"></div>
<div class="tab-panel" id="panel-expire"></div>

<!-- PROGRAMME PANEL -->
<div class="tab-panel" id="panel-programme">
  <div class="programme-section">
    <h2>🎬 Films</h2>
    <div class="inline-form">
      <input id="film-title" type="text" placeholder="Titre *">
      <input id="film-genre" type="text" placeholder="Genre">
      <input id="film-duration" type="number" placeholder="Durée (min)">
      <input id="film-poster" type="text" placeholder="URL affiche (facultatif)">
      <input id="film-synopsis" type="text" placeholder="Synopsis (facultatif)">
      <button class="btn btn-validate" onclick="creerFilm()">➕ Ajouter le film</button>
    </div>
    <div id="films-list"></div>
  </div>

  <div class="programme-section">
    <h2>🗓 Séances</h2>
    <div class="inline-form">
      <select id="seance-film"></select>
      <input id="seance-room" type="text" placeholder="Salle">
      <input id="seance-date" type="date">
      <input id="seance-time" type="time">
      <input id="seance-capacity" type="number" placeholder="Capacité" value="50">
      <button class="btn btn-validate" onclick="creerSeance()">➕ Ajouter la séance</button>
    </div>
    <div id="seances-list"></div>
  </div>
</div>

<!-- FAB -->
<button onclick="toggleForm()" id="fab">➕</button>

<!-- CREATE PANEL (réservation manuelle) -->
<div id="creer-panel">
  <h3>📋 Créer une réservation</h3>
  <div class="form-fields">
    <input id="f-id"           type="text"   placeholder="ID personnalisé *">
    <input id="f-clientName"   type="text"   placeholder="Nom du client *">
    <input id="f-email"        type="email"  placeholder="Email">
    <select id="f-seanceId"></select>
    <input id="f-peopleNumber" type="number" placeholder="Nombre de personnes *" min="1" max="10">
    <button onclick="creer()" class="btn btn-validate" style="margin-top:4px;">Créer la réservation</button>
    <p id="f-msg" style="margin:0; font-size:0.8rem;"></p>
  </div>
</div>

<!-- LOADER -->
<div id="loader">
  <div class="spinner"></div>
  <p>Traitement en cours…</p>
</div>

<script>
let ADMIN_PASS = "";
let currentTab = "attente";
let seancesCache = []; // pour les selects (création résa + création séance)
let filmsCache = [];

/* ── AUTH ── */
async function checkPassword() {
  const pass = document.getElementById("admin-pass").value;
  const res  = await fetch(`/api/checkpass`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password: pass })
  });
  const data = await res.json();
  if (data.ok) {
    ADMIN_PASS = pass;
    document.getElementById("login-screen").style.display = "none";
    load();
    loadProgramme();
  } else {
    document.getElementById("error-msg").style.display = "block";
  }
}

function adminHeaders() {
  return { "Content-Type": "application/json", "x-admin-password": ADMIN_PASS };
}

/* ── LOADER ── */
function showLoader() { document.getElementById("loader").style.display = "flex"; }
function hideLoader() { document.getElementById("loader").style.display = "none"; }

/* ── TABS ── */
function switchTab(tab) {
  currentTab = tab;
  ["attente","valide","refuse","expire","programme"].forEach(t => {
    document.getElementById(`panel-${t}`).classList.toggle("visible", t === tab);
    const btn = document.getElementById(`tab-${t}`);
    btn.className = "tab-btn";
    if (t === tab) btn.classList.add(`active-${t}`);
  });
  document.getElementById("fab").style.display = (tab === "programme") ? "none" : "flex";
}

/* ── SORT HELPER ── */
function sortKey(r) {
  return `${r.sessionDate || ""} ${r.sessionTime || ""}`.trim();
}

/* ── CARD BUILDER (réservations) ── */
function buildCard(r) {
  const statusChip = {
    "validé":    `<span class="status-chip chip-valide">✅ Validé</span>`,
    "refusé":    `<span class="status-chip chip-refuse">❌ Refusé</span>`,
    "expiré":    `<span class="status-chip chip-expire">⏱ Expiré</span>`,
    "en attente": ""
  }[r.status] || "";

  let actions;
  if (r.status === "en attente") {
    actions = `
      <button class="btn btn-validate" onclick="valider('${r.id}')">✅ Valider</button>
      <button class="btn btn-refuse"   onclick="refuser('${r.id}')">❌ Refuser</button>
      <button class="btn btn-delete"   onclick="supprimer('${r.id}')">🗑 Supprimer</button>`;
  } else if (r.status === "validé") {
    actions = `
      ${statusChip}
      <button class="btn btn-reprint"  onclick="reimprimerTicket('${r.id}')">🎫 Obtenir de nouveau le ticket</button>
      <button class="btn btn-delete"   style="margin-left:auto;" onclick="supprimer('${r.id}')">🗑 Supprimer</button>`;
  } else {
    actions = `
      ${statusChip}
      <button class="btn btn-delete"   style="margin-left:auto;" onclick="supprimer('${r.id}')">🗑 Supprimer</button>`;
  }

  return `
    <div class="resa-card">
      <div class="card-header">
        <span class="client-name">👤 ${r.clientName}</span>
        <span class="film-badge">${r.filmTitle}</span>
      </div>
      <div class="card-grid">
        <div class="card-field">
          <span class="field-label">Personnes</span>
          <span class="field-value">🎟 ${r.peopleNumber}</span>
        </div>
        <div class="card-field">
          <span class="field-label">Email</span>
          <span class="field-value">${r.email || '—'}</span>
        </div>
        <div class="card-field">
          <span class="field-label">Date</span>
          <span class="field-value">📅 ${r.sessionDate}</span>
        </div>
        <div class="card-field">
          <span class="field-label">Heure</span>
          <span class="field-value">🕐 ${r.sessionTime}</span>
        </div>
        ${r.roomNumber ? `<div class="card-field">
          <span class="field-label">Salle</span>
          <span class="field-value">🏛 ${r.roomNumber}</span>
        </div>` : ""}
      </div>
      <div class="card-id">ID : ${r.id}</div>
      <div class="card-actions">${actions}</div>
    </div>`;
}

function emptyState(icon, msg) {
  return `<div class="empty"><div class="empty-icon">${icon}</div>${msg}</div>`;
}

/* ── LOAD RÉSERVATIONS ── */
async function load() {
  const res  = await fetch(`/api/admin`, { headers: adminHeaders() });
  if (res.status === 401) { alert("Session admin invalide, reconnecte-toi."); return; }
  const data = await res.json();

  const groups = { "en attente": [], "validé": [], "refusé": [], "expiré": [] };
  data.forEach(r => { if (groups[r.status]) groups[r.status].push(r); });

  groups["en attente"].sort((a, b) => sortKey(a).localeCompare(sortKey(b)));
  groups["validé"].sort((a, b) => sortKey(b).localeCompare(sortKey(a)));
  groups["refusé"].sort((a, b) => sortKey(b).localeCompare(sortKey(a)));
  groups["expiré"].sort((a, b) => sortKey(b).localeCompare(sortKey(a)));

  document.getElementById("count-attente").textContent = groups["en attente"].length;
  document.getElementById("count-valide").textContent  = groups["validé"].length;
  document.getElementById("count-refuse").textContent  = groups["refusé"].length;
  document.getElementById("count-expire").textContent  = groups["expiré"].length;

  const panels = [
    ["attente", "en attente", "⏳", "Aucune réservation en attente"],
    ["valide",  "validé",     "✅", "Aucune réservation validée"],
    ["refuse",  "refusé",     "❌", "Aucune réservation refusée"],
    ["expire",  "expiré",     "⏱", "Aucune réservation expirée"],
  ];
  panels.forEach(([panelId, status, icon, msg]) => {
    const el    = document.getElementById(`panel-${panelId}`);
    const items = groups[status];
    el.innerHTML = items.length ? items.map(buildCard).join("") : emptyState(icon, msg);
  });
}

/* ── ACTIONS RÉSERVATIONS ── */
async function supprimer(id) {
  if (!confirm("Supprimer définitivement cette réservation ?")) return;
  showLoader();
  try {
    const res  = await fetch(`/api/admin/supprimer`, {
      method: "POST", headers: adminHeaders(), body: JSON.stringify({ id })
    });
    alert(await res.text());
  } catch { alert("Erreur serveur !"); }
  hideLoader(); load();
}

async function valider(id) {
  showLoader();
  try {
    const res = await fetch(`/api/admin/valider`, {
      method: "POST", headers: adminHeaders(), body: JSON.stringify({ id })
    });
    if (!res.ok) { alert("Erreur lors de la génération du PDF"); hideLoader(); return; }
    const blob = await res.blob();
    const url  = window.URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `ticket-${id}.pdf`; a.click();
    window.URL.revokeObjectURL(url);
  } catch { alert("Erreur serveur !"); }
  hideLoader(); load();
}

async function reimprimerTicket(id) {
  showLoader();
  try {
    const res = await fetch(`/api/admin/valider`, {
      method: "POST", headers: adminHeaders(), body: JSON.stringify({ id })
    });
    if (!res.ok) { alert("Erreur lors de la génération du PDF"); hideLoader(); return; }
    const blob = await res.blob();
    const url  = window.URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = `ticket-${id}.pdf`; a.click();
    window.URL.revokeObjectURL(url);
  } catch { alert("Erreur serveur !"); }
  hideLoader(); load();
}

async function refuser(id) {
  showLoader();
  try {
    const res  = await fetch(`/api/admin/refuser`, {
      method: "POST", headers: adminHeaders(), body: JSON.stringify({ id })
    });
    alert(await res.text());
  } catch { alert("Erreur serveur !"); }
  hideLoader(); load();
}

/* ── FORM RÉSERVATION MANUELLE ── */
function toggleForm() {
  const panel   = document.getElementById("creer-panel");
  const fab     = document.getElementById("fab");
  const visible = panel.style.display !== "none";
  panel.style.display = visible ? "none" : "block";
  fab.textContent = visible ? "➕" : "✕";
}

function fillSeanceSelect(selectEl) {
  if (seancesCache.length === 0) {
    selectEl.innerHTML = `<option value="">Aucune séance disponible</option>`;
    return;
  }
  selectEl.innerHTML = seancesCache.map(s =>
    `<option value="${s.id}">${s.films?.title || "?"} — ${s.session_date} ${s.session_time?.slice(0,5)} (${s.room_number || "—"})</option>`
  ).join("");
}

async function creer() {
  const get = id => document.getElementById(id).value.trim();
  const msg = document.getElementById("f-msg");
  const payload = {
    id:           get("f-id"),
    clientName:   get("f-clientName"),
    email:        get("f-email"),
    seanceId:     document.getElementById("f-seanceId").value,
    peopleNumber: get("f-peopleNumber")
  };
  if (!payload.id || !payload.clientName || !payload.seanceId || !payload.peopleNumber) {
    msg.style.color = "var(--red)";
    msg.textContent = "⚠ Champs obligatoires manquants.";
    return;
  }
  showLoader();
  try {
    const res  = await fetch(`/api/admin/creer`, {
      method: "POST", headers: adminHeaders(), body: JSON.stringify(payload)
    });
    const text = await res.text();
    if (res.ok) {
      msg.style.color = "var(--green)";
      msg.textContent = "✅ Réservation créée !";
      ["f-id","f-clientName","f-email","f-peopleNumber"].forEach(id => document.getElementById(id).value = "");
    } else {
      msg.style.color = "var(--red)";
      msg.textContent = "❌ " + text;
    }
  } catch {
    msg.style.color = "var(--red)";
    msg.textContent = "❌ Erreur serveur.";
  }
  hideLoader(); load();
}

/* ── PROGRAMME : FILMS ── */
function buildFilmRow(f) {
  const meta = [f.genre, f.duration_minutes ? `${f.duration_minutes} min` : null].filter(Boolean).join(" • ");
  return `
    <div class="film-row">
      <div>
        <div class="title">${f.title}</div>
        <div class="meta">${meta || "—"}</div>
      </div>
      <div class="row-actions">
        <button class="btn btn-delete" onclick="supprimerFilm('${f.id}')">🗑 Supprimer</button>
      </div>
    </div>`;
}

async function loadFilms() {
  const res = await fetch(`/api/admin/films`, { headers: adminHeaders() });
  const data = await res.json();
  filmsCache = data.films || [];
  document.getElementById("films-list").innerHTML = filmsCache.length
    ? filmsCache.map(buildFilmRow).join("")
    : emptyState("🎬", "Aucun film pour le moment.");

  const filmSelect = document.getElementById("seance-film");
  filmSelect.innerHTML = filmsCache.length
    ? filmsCache.map(f => `<option value="${f.id}">${f.title}</option>`).join("")
    : `<option value="">Crée d'abord un film</option>`;
}

async function creerFilm() {
  const title = document.getElementById("film-title").value.trim();
  if (!title) { alert("Le titre est obligatoire."); return; }
  showLoader();
  try {
    const res = await fetch(`/api/admin/films/creer`, {
      method: "POST", headers: adminHeaders(), body: JSON.stringify({
        title,
        genre: document.getElementById("film-genre").value.trim(),
        durationMinutes: document.getElementById("film-duration").value.trim(),
        posterUrl: document.getElementById("film-poster").value.trim(),
        synopsis: document.getElementById("film-synopsis").value.trim()
      })
    });
    if (!res.ok) { alert(await res.text()); hideLoader(); return; }
    ["film-title","film-genre","film-duration","film-poster","film-synopsis"].forEach(id => document.getElementById(id).value = "");
  } catch { alert("Erreur serveur !"); }
  hideLoader(); loadProgramme();
}

async function supprimerFilm(id) {
  if (!confirm("Supprimer ce film ? Ses séances seront aussi supprimées.")) return;
  showLoader();
  try {
    const res = await fetch(`/api/admin/films/supprimer`, {
      method: "POST", headers: adminHeaders(), body: JSON.stringify({ id })
    });
    if (!res.ok) alert(await res.text());
  } catch { alert("Erreur serveur !"); }
  hideLoader(); loadProgramme();
}

/* ── PROGRAMME : SÉANCES ── */
function buildSeanceRow(s) {
  return `
    <div class="seance-row">
      <div>
        <div class="title">${s.films?.title || "?"} — ${s.session_date} ${s.session_time?.slice(0,5)}</div>
        <div class="meta">${s.room_number || "Salle non précisée"} • Capacité ${s.capacity}</div>
      </div>
      <div class="row-actions">
        <button class="btn btn-delete" onclick="supprimerSeance('${s.id}')">🗑 Supprimer</button>
      </div>
    </div>`;
}

async function loadSeances() {
  const res = await fetch(`/api/admin/seances`, { headers: adminHeaders() });
  const data = await res.json();
  seancesCache = data.seances || [];
  document.getElementById("seances-list").innerHTML = seancesCache.length
    ? seancesCache.map(buildSeanceRow).join("")
    : emptyState("🗓", "Aucune séance programmée.");

  fillSeanceSelect(document.getElementById("f-seanceId"));
}

async function creerSeance() {
  const filmId = document.getElementById("seance-film").value;
  const sessionDate = document.getElementById("seance-date").value;
  const sessionTime = document.getElementById("seance-time").value;
  if (!filmId || !sessionDate || !sessionTime) { alert("Film, date et heure sont obligatoires."); return; }
  showLoader();
  try {
    const res = await fetch(`/api/admin/seances/creer`, {
      method: "POST", headers: adminHeaders(), body: JSON.stringify({
        filmId,
        roomNumber: document.getElementById("seance-room").value.trim(),
        sessionDate, sessionTime,
        capacity: document.getElementById("seance-capacity").value.trim()
      })
    });
    if (!res.ok) { alert(await res.text()); hideLoader(); return; }
    document.getElementById("seance-room").value = "";
    document.getElementById("seance-date").value = "";
    document.getElementById("seance-time").value = "";
  } catch { alert("Erreur serveur !"); }
  hideLoader(); loadSeances();
}

async function supprimerSeance(id) {
  if (!confirm("Supprimer cette séance ? Les réservations associées seront aussi supprimées.")) return;
  showLoader();
  try {
    const res = await fetch(`/api/admin/seances/supprimer`, {
      method: "POST", headers: adminHeaders(), body: JSON.stringify({ id })
    });
    if (!res.ok) alert(await res.text());
  } catch { alert("Erreur serveur !"); }
  hideLoader(); loadSeances();
}

async function loadProgramme() {
  await loadFilms();
  await loadSeances();
}

/* ── AUTO REFRESH ── */
setInterval(() => { if (ADMIN_PASS) load(); }, 5000);
</script>
