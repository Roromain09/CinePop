<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CinéPop — Programme</title>
<link rel="icon" href="img/favicon.ico">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bleu: #07111f; --bleu2: #0f1d33; --bleu3: #17284a;
    --jaune: #f5b700; --jaune-soft: #ffd84d;
    --blanc: #ffffff; --gris: #a7b3d1;
    --ombre: rgba(0, 0, 0, 0.45);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    min-height: 100vh;
    color: var(--blanc);
    background:
      radial-gradient(circle at top, rgba(245, 183, 0, 0.14), transparent 28%),
      radial-gradient(circle at bottom right, rgba(17, 34, 64, 0.95), transparent 34%),
      linear-gradient(180deg, #0f1d33 0%, #07111f 100%);
    padding-bottom: 60px;
  }

  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 32px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .logo { display:flex; align-items:center; gap:10px; font-weight:900; font-size:1.2rem; }
  .logo .dot { width:10px; height:10px; border-radius:50%; background: var(--jaune); box-shadow: 0 0 18px rgba(245,183,0,0.8); }
  .nav-links { display:flex; gap:8px; }
  .nav-links a {
    color: var(--gris); text-decoration:none; font-weight:600; font-size:0.92rem;
    padding:9px 16px; border-radius:999px; transition: all 0.2s ease;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--blanc); background: rgba(255,255,255,0.07); }

  .wrap { max-width: 1100px; margin: 0 auto; padding: 20px 24px; }
  .page-title { font-size: 2.2rem; font-weight: 900; margin-bottom: 8px; }
  .page-subtitle { color: var(--gris); margin-bottom: 36px; }

  .film-card {
    background: rgba(17, 34, 64, 0.78);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    padding: 32px;
    margin-bottom: 28px;
    box-shadow: 0 20px 50px var(--ombre);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .film-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 26px 64px var(--ombre);
  }
  .film-head { display:flex; gap:32px; align-items:flex-start; margin-bottom: 24px; }
  .film-info { flex: 1 1 220px; min-width: 0; padding-top: 6px; }

  .poster-frame {
    position: relative;
    flex-shrink: 0;
    width: clamp(220px, 28vw, 300px);
  }
  .poster-frame::before {
    content: "";
    position: absolute;
    inset: -20px;
    background: radial-gradient(circle, rgba(245,183,0,0.32), transparent 70%);
    filter: blur(26px);
    z-index: 0;
  }
  .film-poster {
    position: relative;
    z-index: 1;
    display: block;
    width: 100%;
    aspect-ratio: 2 / 3;
    border-radius: 18px;
    background: linear-gradient(150deg, #1c3258 0%, #0c1830 60%, #08101d 100%);
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 22px 48px rgba(0,0,0,0.6);
    object-fit: cover;
    transition: transform 0.35s ease, box-shadow 0.35s ease;
  }
  .film-card:hover .film-poster {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 28px 58px rgba(0,0,0,0.7);
  }
  .poster-placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .poster-placeholder .placeholder-icon {
    font-size: 3.4rem;
    opacity: 0.55;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.4));
  }
  .poster-tag {
    position: absolute;
    z-index: 2;
    top: 10px;
    left: 10px;
    background: rgba(7,17,31,0.75);
    backdrop-filter: blur(6px);
    color: var(--jaune-soft);
    font-size: 0.68rem;
    font-weight: 800;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.14);
  }

  .film-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; }
  .film-meta { color: var(--jaune-soft); font-size: 0.85rem; font-weight: 700; margin-bottom: 10px; }
  .film-synopsis { color: var(--gris); font-size: 0.92rem; line-height: 1.6; max-width: 65ch; }

  .seances-list { display: flex; flex-direction: column; gap: 10px; }
  .seance-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 12px 16px;
  }
  .seance-row.next {
    border-color: rgba(245,183,0,0.35);
    background: rgba(245,183,0,0.06);
  }
  .seance-row.cancelled {
    opacity: 0.6;
    border-color: rgba(255,68,85,0.25);
    background: rgba(255,68,85,0.04);
  }
  .seance-info { display:flex; gap: 18px; flex-wrap: wrap; font-size: 0.92rem; align-items: center; }
  .seance-info span b { color: var(--blanc); }
  .seance-info span { color: var(--gris); }
  .remaining { font-weight: 700; }
  .remaining.low { color: #ff8c66; }
  .remaining.full { color: #ff6b6b; }
  .badge-annulee {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(255,68,85,0.18);
    color: #ff4455;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 999px;
    letter-spacing: 0.3px;
  }

  .btn-reserve {
    padding: 10px 18px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, var(--jaune), var(--jaune-soft));
    color: #111;
    font-weight: 800;
    font-size: 0.88rem;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
  }
  .btn-reserve.disabled {
    background: rgba(255,255,255,0.08);
    color: var(--gris);
    pointer-events: none;
    cursor: default;
  }
  .btn-reserve.annulee {
    background: rgba(255,68,85,0.14);
    color: #ff6b6b;
    pointer-events: none;
    cursor: default;
  }

  .empty { text-align: center; padding: 80px 20px; color: var(--gris); }
  .empty .icon { font-size: 2.5rem; margin-bottom: 14px; }

  .nav-toggle {
    display: none;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--blanc);
    font-size: 1.3rem;
    line-height: 1;
    padding: 8px 14px;
    border-radius: 12px;
    cursor: pointer;
  }

  /* Vue Calendrier */
  .view-switch {
    display: inline-flex;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 4px;
    border-radius: 14px;
    margin-bottom: 24px;
  }
  .view-btn {
    background: transparent;
    border: none;
    color: var(--gris);
    padding: 8px 16px;
    font-size: 0.88rem;
    font-weight: 700;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .view-btn.active {
    background: rgba(255,255,255,0.08);
    color: var(--blanc);
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 12px;
    margin-bottom: 40px;
  }
  .calendar-day {
    background: rgba(17, 34, 64, 0.4);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 14px;
    min-height: 120px;
  }
  .calendar-day.today {
    border-color: rgba(245,183,0,0.3);
    background: rgba(245,183,0,0.02);
  }
  .day-num { font-weight:800; font-size:1.1rem; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;}
  .day-num .label { font-size: 0.7rem; color: var(--gris); text-transform: uppercase; font-weight:700;}
  .day-seances { display:flex; flex-direction:column; gap:6px; }
  .cal-item {
    font-size: 0.78rem;
    background: rgba(255,255,255,0.05);
    padding: 6px 8px;
    border-radius: 8px;
    text-decoration:none;
    color: var(--blanc);
    border-left: 3px solid var(--jaune);
    display: block;
    line-height: 1.3;
  }
  .cal-item:hover { background: rgba(255,255,255,0.09); }
  .cal-item b { color: var(--jaune-soft); }
  .cal-item.annulee { border-left-color: #ff4455; opacity:0.6; }

  @media (max-width: 960px) {
    .calendar-grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 600px) {
    .calendar-grid { grid-template-columns: repeat(1, 1fr); }
    .calendar-day { min-height: auto; }
  }

  @media (max-width: 680px) {
    nav { flex-wrap: wrap; }
    .nav-toggle { display: block; }
    .nav-links { display: none; width: 100%; flex-direction: column; gap: 6px; margin-top: 14px; }
    .nav-links.open { display: flex; }
    .nav-links a { text-align: center; padding: 12px 16px; }
    .film-head { flex-direction: column; gap: 20px; }
    .poster-frame { width: 100%; max-width: 240px; margin: 0 auto; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo"><div class="dot"></div>CinéPop</div>
  <button class="nav-toggle" id="navToggle">☰</button>
  <div class="nav-links" id="navLinks">
    <a href="/index.html">Accueil</a>
    <a href="/programme.html" class="active">Programme</a>
    <a href="/check.html">Mes réservations</a>
    <a href="/historique.html">Historique</a>
    <a href="/support.html">Support</a>
    <a href="/connexion.html" id="navCompteLink">Mon compte</a>
  </div>
</nav>

<div class="wrap">
  <h1 class="page-title">Films &amp; Séances</h1>
  <div class="page-subtitle">Découvrez la programmation complète et réservez vos tickets.</div>

  <div class="view-switch">
    <button class="view-btn active" id="btnList" onclick="switchView('list')">🎞️ Liste des films</button>
    <button class="view-btn" id="btnCalendar" onclick="switchView('calendar')">📅 Vue Calendrier</button>
  </div>

  <div id="calendarContainer" style="display:none;">
    <div class="calendar-grid" id="calendarGrid"></div>
  </div>

  <div id="content">
    <div class="empty">⏳ Chargement de la programmation…</div>
  </div>
</div>

<script>
let programmeFilms = [];
let currentView = "list"; // 'list' ou 'calendar'

function switchView(view) {
  currentView = view;
  document.getElementById("btnList").classList.toggle("active", view === "list");
  document.getElementById("btnCalendar").classList.toggle("active", view === "calendar");

  if (view === "list") {
    document.getElementById("content").style.display = "";
    document.getElementById("calendarContainer").style.display = "none";
  } else {
    document.getElementById("content").style.display = "none";
    document.getElementById("calendarContainer").style.display = "";
    renderCalendar();
  }
}

function getDaysArray() {
  const arr = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    arr.push(d);
  }
  return arr;
}

function formatDateISO(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function getDayLabel(d) {
  const days = ["Dim", "Lun", "Mar", "Mer", "Jeu", "Ven", "Sam"];
  return days[d.getDay()];
}

function renderCalendar() {
  const grid = document.getElementById("calendarGrid");
  const days = getDaysArray();

  // Extraire toutes les séances à plat
  const allSeances = [];
  programmeFilms.forEach(f => {
    f.seances.forEach(s => {
      allSeances.push({ ...s, filmTitle: f.title });
    });
  });

  grid.innerHTML = days.map((d, index) => {
    const iso = formatDateISO(d);
    const daySeances = allSeances.filter(s => s.sessionDate === iso);
    daySeances.sort((a,b) => a.sessionTime.localeCompare(b.sessionTime));

    const isToday = index === 0;
    const seancesHtml = daySeances.map(s => {
      return `<a href="/reservation.html?seanceId=${s.id}" class="cal-item ${s.cancelled ? 'annulee' : ''}">
        <b>${s.sessionTime}</b> — ${s.filmTitle} ${s.cancelled ? '❌' : ''}
      </a>`;
    }).join("");

    return `
      <div class="calendar-day ${isToday ? 'today' : ''}">
        <div class="day-num">
          <span>${d.getDate()}</span>
          <span class="label">${getDayLabel(d)}</span>
        </div>
        <div class="day-seances">${seancesHtml || '<span style="color:var(--gris); font-size:0.75rem; font-style:italic;">Aucune séance</span>'}</div>
      </div>
    `;
  }).join("");
}

function formatDate(isoStr) {
  if (!isoStr) return "";
  const [y, m, d] = isoStr.split("-");
  return `${d}/${m}`;
}

function buildFilmCard(film) {
  const meta = film.genre || "";

  const poster = film.posterUrl
    ? `<img src="${film.posterUrl}" class="film-poster" alt="Affiche" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">`
    : "";

  const placeholder = `
    <div class="film-poster poster-placeholder" style="${film.posterUrl ? 'display:none;' : ''}">
      <div class="placeholder-icon">🎬</div>
    </div>`;

  // Séances triées par date puis heure
  const sorted = [...film.seances].sort((a, b) => {
    const da = `${a.sessionDate} ${a.sessionTime}`;
    const db = `${b.sessionDate} ${b.sessionTime}`;
    return da.localeCompare(db);
  });

  // Marquer la toute première séance non annulée et à venir comme "Prochaine séance"
  let nextId = null;
  const activeAhead = sorted.filter(s => !s.cancelled);
  if (activeAhead.length > 0) nextId = activeAhead[0].id;

  const seancesHtml = sorted.map(s => {
    const isNext = s.id === nextId;
    let badge = "";
    let btnHtml = "";

    if (s.cancelled) {
      badge = `<span class="badge-annulé">❌ Annulée</span>`;
      btnHtml = `<button class="btn-reserve annulee" disabled>Annulée</button>`;
    } else if (s.seatsRemaining <= 0) {
      badge = `<span class="remaining full">🚫 Complet</span>`;
      btnHtml = `<button class="btn-reserve disabled" disabled>Complet</button>`;
    } else {
      const isLow = s.seatsRemaining <= 15;
      badge = `<span class="remaining ${isLow ? 'low' : ''}">🎟️ ${s.seatsRemaining} places dispo</span>`;
      btnHtml = `<a href="/reservation.html?seanceId=${s.id}" class="btn-reserve">Réserver</a>`;
    }

    return `
      <div class="seance-row ${s.cancelled ? 'cancelled' : ''} ${isNext ? 'next' : ''}">
        <div class="seance-info">
          <span>📅 <b>${formatDate(s.sessionDate)}</b></span>
          <span>🕐 <b>${s.sessionTime}</b></span>
          ${s.roomNumber ? `<span>🏛 Room ${s.roomNumber}</span>` : ""}
          ${isNext ? '<span class="badge-annulee" style="background:rgba(245,183,0,0.2); color:var(--jaune); border:1px solid rgba(245,183,0,0.3)">⭐ Prochaine</span>' : ""}
          ${badge}
        </div>
        <div>${btnHtml}</div>
      </div>`;
  }).join("");

  return `
    <div class="film-card">
      <div class="film-head">
        <div class="poster-frame">
          ${film.genre ? `<span class="poster-tag">${film.genre}</span>` : ""}
          ${poster}
          ${placeholder}
        </div>
        <div class="film-info">
          <div class="film-title">${film.title}</div>
          ${meta ? `<div class="film-meta">${meta}</div>` : ""}
          ${film.synopsis ? `<div class="film-synopsis">${film.synopsis}</div>` : ""}
        </div>
      </div>
      <div class="seances-list">${seancesHtml}</div>
    </div>`;
}

function nextSeanceKey(film) {
  const active = film.seances.filter(s => !s.cancelled);
  const s = active[0] || film.seances[0];
  return s ? `${s.sessionDate} ${s.sessionTime}` : "9999-12-31 23:59";
}

async function load() {
  const content = document.getElementById("content");
  try {
    const res = await fetch("/api/programme");
    const data = await res.json();

    programmeFilms = data.ok ? data.films : [];
    if (currentView === "calendar") renderCalendar();

    if (!data.ok || data.films.length === 0) {
      content.innerHTML = `<div class="empty"><div class="icon">🎞️</div>Aucune séance programmée pour le moment.</div>`;
      return;
    }

    const films = [...data.films].sort((a, b) => nextSeanceKey(a).localeCompare(nextSeanceKey(b)));
    content.innerHTML = films.map(buildFilmCard).join(\"\");
  } catch {
    content.innerHTML = `<div class="empty"><div class="icon">⚠️</div>Impossible de charger la programmation.</div>`;
  }
}

document.getElementById("navToggle").addEventListener("click", () => {
  document.getElementById("navLinks").classList.toggle("open");
});

load();

// 3 — Initialisation Supabase et état de la Navigation

  const _sb = supabase.createClient(
    "https://fsywnmsppegrffvoijuv.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzeXdubXNwcGVncmZmdm9panV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTE1MjUsImV4cCI6MjA5NzE4NzUyNX0.dXoTVu3ZN5kt7JtqSy9PcQpqI9vvto1s61S23WuJgbU"
  );
  const { data: { session } } = await _sb.auth.getSession();
  const link = document.getElementById("navCompteLink");
  if (session?.user) {
    link.href = "/compte.html";
    link.textContent = "Mon compte";
  } else {
    link.href = "/connexion.html";
    link.textContent = "Connexion";
  }
})();
</script>
</body>
</html>
